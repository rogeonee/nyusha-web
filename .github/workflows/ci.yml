name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm lint

      - name: Test
        run: pnpm run --if-present test

      - name: Build
        run: pnpm build
        env:
          AUTH_SECRET: ci-dummy-secret
          POSTGRES_URL: postgresql://ci:ci@localhost:5432/ci_dummy
          GOOGLE_GENERATIVE_AI_API_KEY: ci-dummy
          FAMILY_ALLOWED_EMAILS: ci@example.com
          BLOB_READ_WRITE_TOKEN: ci-dummy
